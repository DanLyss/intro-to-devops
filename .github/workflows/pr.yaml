name: PR — Unit tests

on:
  pull_request:
    branches: [main]

jobs:
  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run unit tests
        run: python -m pytest test_main.py -v --cov=main --cov-report=term-missing
