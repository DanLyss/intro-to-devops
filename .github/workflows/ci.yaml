name: CI — Test, Build, Release

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Run unit tests
        run: python -m pytest test_main.py -v --cov=main --cov-report=term-missing

  integration-test:
    name: Integration tests
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest httpx

      - name: Build Docker image
        run: docker build -t fruits-api-test .

      - name: Start container
        run: |
          docker run -d --name fruits-api-test -p 8000:8000 fruits-api-test
          sleep 5

      - name: Run integration tests
        run: python -m pytest test_integration.py -v

      - name: Stop container
        if: always()
        run: docker rm -f fruits-api-test

  release:
    name: Tag & push to GHCR
    needs: integration-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "$GITHUB_ENV"

      - name: Extract version from main.py
        id: version
        run: |
          VERSION=$(python -c "import re; m=re.search(r'version=\"([^\"]+)\"', open('main.py').read()); print(m.group(1))")
          echo "semver=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=${{ steps.version.outputs.semver }}" \
            -t ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.semver }} \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push to GHCR
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.semver }}
          docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.semver }}
          artifact-name: sbom-${{ steps.version.outputs.semver }}.spdx.json
          output-file: sbom.spdx.json

  deploy:
    name: Deploy to ECS
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Cleanup orphan AWS resources
        continue-on-error: true
        run: |
          # Delete ALB
          ALB_ARN=$(aws elbv2 describe-load-balancers --names fruits-alb --query 'LoadBalancers[0].LoadBalancerArn' --output text 2>/dev/null || true)
          [ "$ALB_ARN" != "None" ] && [ -n "$ALB_ARN" ] && aws elbv2 delete-load-balancer --load-balancer-arn $ALB_ARN && sleep 10 || true

          # Delete Target Group
          TG_ARN=$(aws elbv2 describe-target-groups --names fruits-tg --query 'TargetGroups[0].TargetGroupArn' --output text 2>/dev/null || true)
          [ "$TG_ARN" != "None" ] && [ -n "$TG_ARN" ] && aws elbv2 delete-target-group --target-group-arn $TG_ARN || true

          # Delete IAM Role
          aws iam detach-role-policy --role-name ecsTaskExecutionRole --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy 2>/dev/null || true
          aws iam delete-role --role-name ecsTaskExecutionRole 2>/dev/null || true

          # Delete RDS
          aws rds delete-db-instance --db-instance-identifier fruits-db --skip-final-snapshot 2>/dev/null || true
          aws rds wait db-instance-deleted --db-instance-identifier fruits-db 2>/dev/null || true

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_image_url: ghcr.io/${{ github.repository }}:${{ github.sha }}